---
# ═══════════════════════════════════════════════════════
# Deployment — Secure AI Gateway (3 replicas)
# ═══════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: secure-ai-gateway
  namespace: secure-ai-dev
  labels:
    app: secure-ai-gateway
    version: v2.0.0
spec:
  replicas: 3
  selector:
    matchLabels:
      app: secure-ai-gateway
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: secure-ai-gateway
        version: v2.0.0
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8080"
    spec:
      serviceAccountName: secure-ai-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
        - name: secure-ai-gateway
          image: your-dockerhub-username/secure-ai-gateway:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: secure-ai-config
            - secretRef:
                name: secure-ai-secrets
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp-dir
              mountPath: /tmp
            - name: logs-dir
              mountPath: /var/log/secure-ai-gateway

        # ─── Sidecar: NVIDIA NeMo Guardrails v0.10.0 (Layer 1) ───
        - name: nemo-guardrails
          image: nemo-guardrails:0.10.0
          ports:
            - containerPort: 8001
              name: nemo
          env:
            - name: OLLAMA_BASE_URL
              value: "http://localhost:11434"
            - name: GUARDRAILS_MODEL
              value: "mistral:7b"
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /v1/health
              port: 8001
            initialDelaySeconds: 45
            periodSeconds: 30
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false

        # ─── Sidecar: Microsoft Presidio v2.2 (Layer 3) ───────────
        - name: presidio-analyzer
          image: mcr.microsoft.com/presidio-analyzer:latest
          ports:
            - containerPort: 5002
              name: presidio
          env:
            - name: PORT
              value: "5002"
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 5002
            initialDelaySeconds: 30
            periodSeconds: 30
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false

        # ─── Sidecar: Ollama (LLaMA 3.1 8B + LlamaGuard 3) ──────
        - name: ollama
          image: ollama/ollama:0.6.2
          ports:
            - containerPort: 11434
              name: ollama
          resources:
            requests:
              memory: "2Gi"
              cpu: "1000m"
            limits:
              memory: "4Gi"
              cpu: "2000m"
          securityContext:
            allowPrivilegeEscalation: false
            # readOnlyRootFilesystem: false — Ollama needs writable /root/.ollama
            # for model weights and runtime temp files
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: ollama-data
              mountPath: /root/.ollama
          livenessProbe:
            exec:
              command: ["ollama", "list"]
            initialDelaySeconds: 30
            periodSeconds: 30

      volumes:
        - name: tmp-dir
          emptyDir: {}
        - name: logs-dir
          emptyDir: {}
        - name: ollama-data
          emptyDir: {}
---
# ═══════════════════════════════════════════════════════
# Service — ClusterIP
# ═══════════════════════════════════════════════════════
apiVersion: v1
kind: Service
metadata:
  name: secure-ai-gateway-service
  namespace: secure-ai-dev
  labels:
    app: secure-ai-gateway
spec:
  selector:
    app: secure-ai-gateway
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
      name: http
  type: ClusterIP
---
# ═══════════════════════════════════════════════════════
# Horizontal Pod Autoscaler
# ═══════════════════════════════════════════════════════
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: secure-ai-gateway-hpa
  namespace: secure-ai-dev
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: secure-ai-gateway
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
---
# ═══════════════════════════════════════════════════════
# Ingress (Nginx)
# ═══════════════════════════════════════════════════════
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: secure-ai-ingress
  namespace: secure-ai-dev
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
spec:
  ingressClassName: nginx
  rules:
    - host: secure-ai.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: secure-ai-gateway-service
                port:
                  number: 80
---
# ═══════════════════════════════════════════════════════
# ServiceAccount
# ═══════════════════════════════════════════════════════
apiVersion: v1
kind: ServiceAccount
metadata:
  name: secure-ai-sa
  namespace: secure-ai-dev
automountServiceAccountToken: false
