---
# ═══════════════════════════════════════════════════════
# k8s/namespace.yaml
# ═══════════════════════════════════════════════════════
apiVersion: v1
kind: Namespace
metadata:
  name: secure-ai-dev
  labels:
    app: secure-ai-gateway
    env: dev
---
apiVersion: v1
kind: Namespace
metadata:
  name: secure-ai-prod
  labels:
    app: secure-ai-gateway
    env: prod
---
# ═══════════════════════════════════════════════════════
# ConfigMap — non-sensitive application config
# ═══════════════════════════════════════════════════════
apiVersion: v1
kind: ConfigMap
metadata:
  name: secure-ai-config
  namespace: secure-ai-dev
data:
  SPRING_PROFILES_ACTIVE: "prod"
  DB_HOST: "postgres-service"
  DB_PORT: "5432"
  DB_NAME: "secureai"
  DB_USERNAME: "secureai_user"
  OLLAMA_BASE_URL: "http://ollama-service:11434"
  OLLAMA_MODEL: "llama3.1:8b"
  RATE_LIMIT_CAPACITY: "100"
  RATE_LIMIT_REFILL_MINUTES: "60"
  MANAGEMENT_ENDPOINTS_INCLUDE: "health,info,metrics,prometheus"
---
# ═══════════════════════════════════════════════════════
# Secret — NEVER commit real secrets to Git!
# Create secrets via kubectl command (Zero Trust):
#
#   kubectl create secret generic secure-ai-secrets \
#     --namespace=secure-ai-dev \
#     --from-literal=DB_PASSWORD='<your-db-password>' \
#     --from-literal=JWT_SECRET='<your-64-char-random-key>' \
#     --from-literal=SONAR_TOKEN='<your-sonarqube-token>'
#
# For production: use HashiCorp Vault, AWS Secrets Manager,
# or Kubernetes External Secrets Operator
# ═══════════════════════════════════════════════════════
apiVersion: v1
kind: Secret
metadata:
  name: secure-ai-secrets
  namespace: secure-ai-dev
type: Opaque
stringData:
  # Set via: kubectl create secret generic secure-ai-secrets --from-literal=DB_PASSWORD='<value>'
  DB_PASSWORD: ""
  # Set via: kubectl create secret generic secure-ai-secrets --from-literal=JWT_SECRET='<value>'
  JWT_SECRET: ""
  # Set via: kubectl create secret generic secure-ai-secrets --from-literal=SONAR_TOKEN='<value>'
  SONAR_TOKEN: ""
