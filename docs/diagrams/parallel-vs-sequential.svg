<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 600" font-family="'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="ar" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#555"/></marker>
  </defs>
  <rect width="520" height="600" fill="#fff"/>

  <!-- Title -->
  <text x="260" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1a1a">Parallel vs Sequential Execution</text>
  <text x="260" y="44" text-anchor="middle" font-size="10" fill="#666">GuardrailsOrchestrator.java — Project Reactor Mono.zip()</text>
  <line x1="150" y1="52" x2="370" y2="52" stroke="#CC0000" stroke-width="2"/>

  <!-- Two columns -->
  <!-- LEFT: Sequential -->
  <rect x="20" y="66" width="225" height="30" rx="6" fill="#CC0000"/>
  <text x="132" y="85" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">Sequential (Traditional)</text>

  <!-- Step 1 -->
  <rect x="40" y="108" width="185" height="40" rx="8" fill="#E7F1FA" stroke="#0066CC" stroke-width="1.2"/>
  <text x="132" y="125" text-anchor="middle" font-size="10" font-weight="bold" fill="#0066CC">NeMo Guardrails</text>
  <text x="132" y="140" text-anchor="middle" font-size="8" fill="#888">~30ms</text>
  <line x1="132" y1="148" x2="132" y2="164" stroke="#555" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#ar)"/>
  <text x="140" y="160" font-size="7" fill="#999">waits...</text>

  <!-- Step 2 -->
  <rect x="40" y="168" width="185" height="40" rx="8" fill="#FDF3D8" stroke="#D4940A" stroke-width="1.2"/>
  <text x="132" y="185" text-anchor="middle" font-size="10" font-weight="bold" fill="#8A6D3B">LlamaGuard 3</text>
  <text x="132" y="200" text-anchor="middle" font-size="8" fill="#888">~60ms</text>
  <line x1="132" y1="208" x2="132" y2="224" stroke="#555" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#ar)"/>
  <text x="140" y="220" font-size="7" fill="#999">waits...</text>

  <!-- Step 3 -->
  <rect x="40" y="228" width="185" height="40" rx="8" fill="#E9F5E8" stroke="#3E8635" stroke-width="1.2"/>
  <text x="132" y="245" text-anchor="middle" font-size="10" font-weight="bold" fill="#3E8635">Presidio PII</text>
  <text x="132" y="260" text-anchor="middle" font-size="8" fill="#888">~40ms</text>

  <!-- Total Sequential -->
  <line x1="132" y1="268" x2="132" y2="288" stroke="#555" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#ar)"/>
  <rect x="52" y="292" width="160" height="34" rx="8" fill="#FCE8E8" stroke="#CC0000" stroke-width="1.5"/>
  <text x="132" y="310" text-anchor="middle" font-size="11" font-weight="bold" fill="#CC0000">Total: ~160ms</text>

  <!-- RIGHT: Parallel -->
  <rect x="275" y="66" width="225" height="30" rx="6" fill="#3E8635"/>
  <text x="387" y="85" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">Parallel (Ours)</text>

  <!-- All 3 start simultaneously -->
  <text x="387" y="107" text-anchor="middle" font-size="8" fill="#666">All start simultaneously</text>

  <!-- 3 boxes side by side -->
  <rect x="278" y="114" width="70" height="50" rx="6" fill="#E7F1FA" stroke="#0066CC" stroke-width="1"/>
  <text x="313" y="135" text-anchor="middle" font-size="8" font-weight="bold" fill="#0066CC">NeMo</text>
  <text x="313" y="148" text-anchor="middle" font-size="7" fill="#888">30ms</text>
  <text x="313" y="159" text-anchor="middle" font-size="7" fill="#3E8635">Done!</text>

  <rect x="353" y="114" width="70" height="50" rx="6" fill="#FDF3D8" stroke="#D4940A" stroke-width="1"/>
  <text x="388" y="135" text-anchor="middle" font-size="8" font-weight="bold" fill="#8A6D3B">Guard</text>
  <text x="388" y="148" text-anchor="middle" font-size="7" fill="#888">60ms</text>
  <text x="388" y="159" text-anchor="middle" font-size="7" fill="#CC0000">Bottleneck</text>

  <rect x="428" y="114" width="70" height="50" rx="6" fill="#E9F5E8" stroke="#3E8635" stroke-width="1"/>
  <text x="463" y="135" text-anchor="middle" font-size="8" font-weight="bold" fill="#3E8635">Presidio</text>
  <text x="463" y="148" text-anchor="middle" font-size="7" fill="#888">40ms</text>
  <text x="463" y="159" text-anchor="middle" font-size="7" fill="#3E8635">Done!</text>

  <!-- Converge arrow -->
  <line x1="313" y1="164" x2="387" y2="184" stroke="#555" stroke-width="0.8" stroke-dasharray="3,2"/>
  <line x1="463" y1="164" x2="387" y2="184" stroke="#555" stroke-width="0.8" stroke-dasharray="3,2"/>
  <line x1="387" y1="164" x2="387" y2="190" stroke="#555" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#ar)"/>

  <!-- Wait for slowest -->
  <rect x="310" y="194" width="155" height="26" rx="6" fill="#fff" stroke="#888" stroke-width="1"/>
  <text x="387" y="211" text-anchor="middle" font-size="8" fill="#666">Wait for slowest (60ms)</text>

  <line x1="387" y1="220" x2="387" y2="240" stroke="#555" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#ar)"/>

  <!-- Total Parallel -->
  <rect x="307" y="244" width="160" height="34" rx="8" fill="#E9F5E8" stroke="#3E8635" stroke-width="1.5"/>
  <text x="387" y="264" text-anchor="middle" font-size="11" font-weight="bold" fill="#3E8635">Total: ~90ms</text>

  <!-- VS divider -->
  <line x1="260" y1="80" x2="260" y2="330" stroke="#eee" stroke-width="1"/>
  <circle cx="260" cy="205" r="16" fill="#2D2D2D"/>
  <text x="260" y="209" text-anchor="middle" font-size="9" font-weight="bold" fill="#fff">vs</text>

  <!-- Comparison box -->
  <rect x="20" y="345" width="480" height="100" rx="10" fill="#FAFAFA" stroke="#eee" stroke-width="1"/>
  <text x="260" y="368" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a1a1a">Result: 44% Latency Reduction</text>

  <rect x="40" y="382" width="110" height="22" rx="4" fill="#FCE8E8" stroke="#CC0000" stroke-width="1"/>
  <text x="95" y="397" text-anchor="middle" font-size="9" font-weight="bold" fill="#CC0000">Sequential: 160ms</text>

  <text x="170" y="397" font-size="14" fill="#555">→</text>

  <rect x="190" y="382" width="110" height="22" rx="4" fill="#E9F5E8" stroke="#3E8635" stroke-width="1"/>
  <text x="245" y="397" text-anchor="middle" font-size="9" font-weight="bold" fill="#3E8635">Parallel: 90ms</text>

  <text x="318" y="397" font-size="9" fill="#555">=</text>

  <rect x="335" y="378" width="75" height="30" rx="6" fill="#CC0000"/>
  <text x="372" y="397" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">-44%</text>

  <text x="260" y="432" text-anchor="middle" font-size="9" fill="#888">Guardrails contribute only 5.6% of total E2E latency (~1600ms) — LLM inference dominates at 93.8%</text>

  <!-- E2E Breakdown visual -->
  <rect x="20" y="460" width="480" height="130" rx="10" fill="#fff" stroke="#eee" stroke-width="1"/>
  <text x="260" y="482" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">End-to-End Latency Breakdown</text>

  <!-- Stacked horizontal bar -->
  <rect x="40" y="496" width="440" height="24" rx="4" fill="#2D2D2D"/>
  <rect x="40" y="496" width="25" height="24" rx="4" fill="#CC0000"/>
  <text x="52" y="512" text-anchor="middle" font-size="6" fill="#fff">5.6%</text>

  <!-- Labels -->
  <rect x="40" y="530" width="12" height="12" rx="2" fill="#CC0000"/>
  <text x="58" y="540" font-size="9" fill="#333">Guardrails: ~90ms (5.6%)</text>

  <rect x="200" y="530" width="12" height="12" rx="2" fill="#2D2D2D"/>
  <text x="218" y="540" font-size="9" fill="#333">LLM Inference: ~1500ms (93.8%)</text>

  <text x="40" y="570" font-size="8" fill="#999">JWT Auth ~2ms (0.1%) not shown — negligible</text>

  <!-- Footer -->
  <line x1="20" y1="588" x2="500" y2="588" stroke="#eee" stroke-width="1"/>
  <text x="260" y="598" text-anchor="middle" font-size="7" fill="#999">Implementation: GuardrailsOrchestrator.java | Project Reactor Mono.zip() | Bounded-elastic thread pools</text>
</svg>