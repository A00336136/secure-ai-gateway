version: '3.9'

# ═══════════════════════════════════════════════════════════════════
# Secure AI Gateway — Infrastructure & DevOps Tools
#
# These are NOT part of the application — they are development
# infrastructure and CI/CD tooling, kept separate from the
# application stack.
#
# Services:
#   sonarqube   — Code quality analysis (port 9001)
#   jenkins     — CI/CD pipeline server (port 9095)
#   prometheus  — Metrics collection (port 9092)
#   grafana     — Monitoring dashboards (port 3001)
#
# Start infra only:  docker-compose -f docker-compose.infra.yml up -d
# Start with app:    docker-compose -f docker-compose.yml -f docker-compose.infra.yml up -d
# ═══════════════════════════════════════════════════════════════════

networks:
  secure-ai-net:
    external: true
    name: secure-ai-net

volumes:
  sonarqube_data:
  sonarqube_logs:
  sonarqube_extensions:
  jenkins_home:
  prometheus_data:
  grafana_data:

services:

  # ─── SonarQube Community (Port 9001) ─────────────────────────────
  # Free & open-source — Quality Gate, JaCoCo coverage, code smells,
  # security hotspots, bug detection, maintainability ratings
  # Default login: admin / admin (change on first login)
  sonarqube:
    image: sonarqube:community
    container_name: secure-ai-sonarqube
    ports:
      - "9001:9000"
    environment:
      SONAR_JDBC_URL: ${SONAR_JDBC_URL}
      SONAR_JDBC_USERNAME: ${POSTGRES_USER}
      SONAR_JDBC_PASSWORD: ${POSTGRES_PASSWORD}
      SONAR_TELEMETRY_ENABLE: "false"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs
      - sonarqube_extensions:/opt/sonarqube/extensions
    networks:
      - secure-ai-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/api/system/status | grep -q '\"status\":\"UP\"'"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    restart: unless-stopped

  # ─── Jenkins CI/CD (Port 9095) ─────────────────────────────────
  # Uses custom image with Docker CLI + Trivy baked in (docker/Dockerfile.jenkins)
  # This prevents "docker: not found" and "trivy: not found" errors in the pipeline
  # The jenkins_home volume persists all jobs, credentials, and config across restarts
  jenkins:
    build:
      context: .
      dockerfile: docker/Dockerfile.jenkins
    image: secure-ai-jenkins:custom
    container_name: secure-ai-jenkins
    ports:
      - "9095:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      # Mount Docker socket — allows Jenkins to build/push images (Docker-in-Docker)
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - secure-ai-net
    environment:
      JAVA_OPTS: "-Djenkins.install.runSetupWizard=false"
    restart: unless-stopped

  # ─── Prometheus (Port 9092) ─────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: secure-ai-prometheus
    ports:
      - "9092:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
    networks:
      - secure-ai-net
    restart: unless-stopped

  # ─── Grafana (Port 3001) ───────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: secure-ai-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:?GF_SECURITY_ADMIN_PASSWORD must be set in .env}
      GF_USERS_ALLOW_SIGN_UP: 'false'
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - secure-ai-net
    restart: unless-stopped
