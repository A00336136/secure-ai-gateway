version: '3.9'

# ═══════════════════════════════════════════════════════════════════
# Secure AI Gateway — Application Stack
#
# Services:
#   app         — Spring Boot gateway (port 8080)
#   postgres    — PostgreSQL 17.2 (port 5432)
#   ollama      — Local LLM server (port 11434)
#   nemo-guardrails — NeMo Guardrails (port 8001)
#   presidio    — Microsoft Presidio PII detection (port 5002)
#
# Infrastructure (SonarQube, Jenkins, Prometheus, Grafana) is in:
#   docker-compose.infra.yml
#
# Start app:   docker-compose up -d
# Start infra: docker-compose -f docker-compose.infra.yml up -d
# Start both:  docker-compose -f docker-compose.yml -f docker-compose.infra.yml up -d
# Pull model:  docker exec -it secure-ai-ollama ollama pull llama3.1:8b
# ═══════════════════════════════════════════════════════════════════

networks:
  secure-ai-net:
    driver: bridge

volumes:
  postgres_data:
  ollama_data:

services:

  # ─── Spring Boot Application ───────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: secure-ai-gateway
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL}
      OLLAMA_MODEL: ${OLLAMA_MODEL}
      JWT_SECRET: ${JWT_SECRET}
      NEMO_GUARDRAILS_URL: ${NEMO_GUARDRAILS_URL}
      PRESIDIO_URL: ${PRESIDIO_URL}
      LLAMAGUARD_MODEL: ${LLAMAGUARD_MODEL}
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
      nemo-guardrails:
        condition: service_started
      presidio:
        condition: service_started
    networks:
      - secure-ai-net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  # ─── PostgreSQL ─────────────────────────────────────────────────
  postgres:
    image: postgres:17.2-alpine
    container_name: secure-ai-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init-sonarqube-db.sql:/docker-entrypoint-initdb.d/01-sonarqube.sql:ro
    networks:
      - secure-ai-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── Ollama Local LLM ───────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: secure-ai-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - secure-ai-net
    # GPU support (uncomment if NVIDIA GPU available):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  # ─── NVIDIA NeMo Guardrails (Layer 1 — Colang DSL) ─────────────
  nemo-guardrails:
    build:
      context: ./nemo-guardrails
      dockerfile: Dockerfile
    container_name: secure-ai-nemo-guardrails
    ports:
      - "8001:8001"
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      GUARDRAILS_MODEL: mistral:7b
    volumes:
      - ./nemo-guardrails/config:/app/config
    networks:
      - secure-ai-net
    depends_on:
      ollama:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    restart: unless-stopped

  # ─── Microsoft Presidio (Layer 3 — PII Detection) ─────────────
  presidio:
    image: mcr.microsoft.com/presidio-analyzer:latest
    container_name: secure-ai-presidio
    ports:
      - "5002:5002"
    environment:
      PORT: 5002
    networks:
      - secure-ai-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
