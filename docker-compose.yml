version: '3.9'

# ═══════════════════════════════════════════════════════════════════
# Secure AI Gateway — Application Stack
#
# Services:
#   app              — Spring Boot gateway (host port 8100)
#   postgres         — PostgreSQL 17.2 (host port 5434)
#   ollama           — Local LLM server (host port 11434)
#   nemo-guardrails  — NVIDIA NeMo Guardrails (host port 8001)
#   presidio         — Microsoft Presidio PII detection (host port 5002)
#
# Infrastructure (SonarQube, Jenkins, Prometheus, Grafana) is in:
#   secureai-infra Docker Compose stack (separate project)
#
# Host Ports (isolated from NutriTrack):
#   App: 8100 | DB: 5434 | Ollama: 11434
#   NeMo: 8001 | Presidio: 5002
#
# Start:  docker-compose -p secureai-app up -d
# Stop:   docker-compose -p secureai-app down
# Logs:   docker-compose -p secureai-app logs -f
# ═══════════════════════════════════════════════════════════════════

networks:
  secure-ai-net:
    external: true
    name: secure-ai-net

volumes:
  secureai_postgres_data:
  secureai_ollama_data:
  secureai_redis_data:

services:

  # ─── Spring Boot Application (port 8100) ───────────────────────
  app:
    image: absartus/secure-ai-gateway:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: secureai-gateway
    ports:
      - "8100:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: secureai-app-db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-secureai}
      DB_USERNAME: ${DB_USERNAME:-secureai_user}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set in .env}
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.1:8b}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in .env}
      NEMO_GUARDRAILS_URL: http://secureai-nemo-guardrails:8001
      PRESIDIO_URL: http://secureai-presidio:5002
      LLAMAGUARD_MODEL: ${LLAMAGUARD_MODEL:-llamaguard3:1b}
      REDIS_ENABLED: "true"
      SPRING_DATA_REDIS_HOST: secureai-redis
      SPRING_DATA_REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_started
      nemo-guardrails:
        condition: service_started
      presidio:
        condition: service_started
    networks:
      - secure-ai-net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  # ─── PostgreSQL 17.2 (host port 5434) ──────────────────────────
  # Port 5434 to avoid conflict with NutriTrack MySQL (3306)
  # and SecureAI SonarQube DB (5433)
  postgres:
    image: postgres:17.2-alpine
    container_name: secureai-app-db
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-secureai}
      POSTGRES_USER: ${POSTGRES_USER:-secureai_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - secureai_postgres_data:/var/lib/postgresql/data
    networks:
      - secure-ai-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── Ollama Local LLM Server (host port 11434) ─────────────────
  # Serves llama3.1:8b for chat + llamaguard3:1b for content safety
  ollama:
    image: ollama/ollama:latest
    container_name: secureai-ollama
    ports:
      - "11434:11434"
    environment:
      OLLAMA_KEEP_ALIVE: "-1"
      OLLAMA_NUM_PARALLEL: "3"
      OLLAMA_MAX_LOADED_MODELS: "3"
      OLLAMA_FLASH_ATTENTION: "1"
    volumes:
      - secureai_ollama_data:/root/.ollama
    networks:
      - secure-ai-net
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  # ─── NVIDIA NeMo Guardrails (host port 8001) ───────────────────
  # Layer 1: Colang DSL policy enforcement
  # Jailbreak detection, content safety, topic control
  nemo-guardrails:
    image: secure-ai-nemo-guardrails:latest
    build:
      context: ./nemo-guardrails
      dockerfile: Dockerfile
    container_name: secureai-nemo-guardrails
    ports:
      - "8001:8001"
    environment:
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      GUARDRAILS_MODEL: gemma2:2b
    volumes:
      - ./nemo-guardrails/config:/app/config
    networks:
      - secure-ai-net
    depends_on:
      ollama:
        condition: service_started
    healthcheck:
      # /v1/rails/configs returns 200 with [{"id":"config"}] — correct NeMo API endpoint
      # /v1/health returns 404 (not implemented in nemoguardrails 0.10.x)
      test: ["CMD", "curl", "-sf", "http://localhost:8001/v1/rails/configs"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    restart: unless-stopped

  # ─── Redis (host port 6380) ────────────────────────────────────
  # Distributed JWT blacklist + rate limiter state (prod profile)
  # Port 6380 to avoid conflict with any local Redis on 6379
  redis:
    image: redis:7.2-alpine
    container_name: secureai-redis
    ports:
      - "6380:6379"
    command: redis-server --save 60 1 --loglevel warning --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - secureai_redis_data:/data
    networks:
      - secure-ai-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── Microsoft Presidio PII Analyzer (host port 5002) ──────────
  # Layer 3: PII detection and redaction
  # Detects SSN, credit cards, emails, phone numbers, etc.
  presidio:
    image: mcr.microsoft.com/presidio-analyzer:latest
    container_name: secureai-presidio
    ports:
      - "5002:5002"
    environment:
      PORT: 5002
    networks:
      - secure-ai-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
