apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "secure-ai-gateway.fullname" . }}-test-connection"
  namespace: {{ include "secure-ai-gateway.namespace" . }}
  labels:
    {{- include "secure-ai-gateway.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: wget
      image: busybox:1.36
      command: ['wget']
      args:
        - '--no-check-certificate'
        - '--spider'
        - '--timeout=10'
        - 'http://{{ include "secure-ai-gateway.fullname" . }}:{{ .Values.service.port }}/actuator/health'
