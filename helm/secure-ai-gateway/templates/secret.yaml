apiVersion: v1
kind: Secret
metadata:
  name: {{ include "secure-ai-gateway.fullname" . }}-secret
  namespace: {{ include "secure-ai-gateway.namespace" . }}
  labels:
    {{- include "secure-ai-gateway.labels" . | nindent 4 }}
type: Opaque
data:
  DB_PASSWORD: {{ .Values.secrets.dbPassword | b64enc | quote }}
  SPRING_DATASOURCE_PASSWORD: {{ .Values.secrets.dbPassword | b64enc | quote }}
